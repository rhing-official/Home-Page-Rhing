<svg width="800" height="300" viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" preserveAspectRatio="xMinYMin meet" ><rect id="svgEditorBackground" x="0" y="0" width="800" height="300" style="fill:none;stroke:none"/>
  <rect width="800" height="300" fill="none"/>

  <!--
    ローカル座標系（スケール前）での各文字配置:
      R  : x=0  ..150, y=27.5..190 (translate 0, 27.5)  → ローカル下端162.5
      h  : x=160..230, y=50 ..190  (translate 160, 70)   → ローカルy=-20..120
      i  : x=245..265, y=45 ..190  (translate 245, 70)   → ローカルy=-25..120
      n  : x=278..348, y=70 ..190  (translate 278, 70)   → ローカルy=0..120
      g  : x=363..435, y=70 ..190  (translate 363, 70)   → ローカルy=0..120
    全体BBox: x=0..435, y=45..190 → w=435, h=145
    スケール: min((800-40)/435, (300-40)/145) = min(1.747, 1.793) = 1.747
    translate: tx=(800-435*1.747)/2=41.5, ty=(300-145*1.747)/2-45*1.747=(-108.6+150+20-78.6...)
    → tx=(800-759.9)/2=20.05≈20, ty=(300-253.3)/2 - 45*1.747 = 23.35 - 78.6 = -55.3
    BBox: (0,32)..(435,200), w=435, h=168
    scale=min(760/435, 260/168)=min(1.747,1.548)=1.548
    tx=(800-435*1.548)/2 - 0*1.548 = (800-673)/2 = 63.5
    ty=(300-168*1.548)/2 - 32*1.548 = (300-260)/2 - 49.5 = 20-49.5 = -29.5
    → translate(32.917, -79.430) scale(1.8951)
  -->
  <g transform="translate(32.917, -79.430) scale(1.8951)">

    <!-- ========== R（林檎） ========== -->
    <!-- Rのデザインは変更なし。下端ローカル=162.5, translate-y=27.5 → グローバル190 -->
    <g transform="translate(0, 27.838)">
      <!-- Rの斜め足: 色を#C2A991に変更 -->
      <path d="M 69.63164941176218 91.8962870587681 L 127.41220235801055 132.81500960100715 L 143.53460271820043 158.22837036230175 L 147.5700560131929 130.474267939693 z" fill="#C2A991" transform="matrix(0.557044, 0, 0, 1.10154, 25.8578, -9.86559)"/>
      <!-- Rの縦棒: 色を#C2A991に変更 -->
      <rect x="37.5" y="62.4999" width="32.5" height="100" rx="16.25" ry="16.25" fill="#C2A991" transform="matrix(1, 0, 0, 1.07548, 0, -12.543)"/>
      <!-- りんごの断面 (変更なし) -->
      <ellipse cx="65.6782" cy="64.2511" rx="30.1394" ry="27.2069" fill="#E74C3C"/>
      <ellipse cx="65.6785" cy="64.2515" rx="24.2168" ry="22.618" fill="#F5E6D3"/>
      <ellipse cx="65.6785" cy="64.2515" rx="8.75" ry="7.5" fill="#D4A574"/>
      <!-- 種 (変更なし) -->
      
      <ellipse cx="62.5185" cy="61.1653" rx="1.5" ry="2.5" fill="#000000" transform="matrix(0.866025, -0.5, 0.5, 0.866025, -21.4142, 42.5809)"/>
      <ellipse cx="71.4554" cy="68.0636" rx="1.5" ry="2.5" fill="#000000" transform="matrix(0.866025, 0.5, -0.5, 0.866025, 40.8406, -29.9191)"/>
      
      
      <!-- へた (変更なし) -->
      <rect x="63.6784" y="26.6432" width="4" height="12.5" rx="2" ry="2" fill="#8B4513" transform="matrix(1, 0, 0, 0.676962, 0, 12.9081)"/>
      <!-- 葉 (変更なし) -->
      <ellipse cx="71.1953" cy="21.994" rx="6.25" ry="3.75" fill="#2ECC71" transform="matrix(0.597163, 0.159197, -0.159197, 0.597163, 30.8553, 9.61003)"/>
      
      <!-- 葉脈 (変更なし) -->
      
      
    </g>

    <!-- ========== h ========== -->
    <!--
      スケッチ特徴:
      - 左縦棒: 上端は左側が高く右側が低い斜め切り欠き、下端はフレア（外広がり）
      - アーチ: 大きく丸みのある天井
      - 右脚: 下端が外側（右）に広がるフレア
      ローカル: 上端y=-20(斜め), 下端y=120, 幅x=0..68
    -->
    <g transform="matrix(1, 0, 0, 1, 126.83, 72.2673)">
      <!-- 左縦棒: 上端斜め切り欠き（iと同方向: 左が低く右が高い）、下端フレア -->
      <!-- 上端: 左(x=0)がy=-8、右(x=20)がy=-20 -->
      <!-- 下端: 左(x=-4)がy=120、右(x=20)がy=120 (わずかにフレア) -->
      <path d="M -5.5252588235672135 -0.2646376470059195 L 11.159585882292475 30.464030588580464 L 20 120 L -4 120 z" fill="#728d81"/>

      <!-- アーチ部分: 大きく丸い天井から右脚へ -->
      <!-- 右脚下端もフレア: x=50..72 -->
      <path d="M9.686183529341207,74.82970352985518Q28.103712941231862,32.72866823558638,48.63031058828065,79.14084235355091Q43.68886117630427,102.71528000077095,58.79123529405467,86.30310588280643L61.73803999995721,80.58648705855396L45,120L40.21485310169436,115.32274210170476Q41.52659764704873,96.35228470645932,31.053195294097492,88.61692235346521Q14.106390588194955,88.24857176522738,17.421545882335295,103.35362352994082Z" fill="#728d81"/>
    </g>

    <!-- ========== i ========== -->
    <!--
      スケッチ特徴:
      - 縦棒が下に向かって台形状に広がる（上が狭く下が広い）
      - 上端は斜め切り欠き（h同様）
      - 点は小さな菱形（◇）
      ローカル: y=-25..120, x=0..22
    -->
    <g transform="matrix(1, 0, 0, 1, 201.886, 72.2673)">
      <!-- 縦棒: 上端斜め切り欠き、下端が広がる台形 -->
      <!-- 上: x=2..16 (幅14), 下: x=0..20 (幅20) -->
      <path d="M -0.31515529414031107 68.61692235346521 L 16.36835058823783 55.14352000051396 L 22.946804705902537 101.60888941257596 L 20 120 L 0 120 z" fill="#f0cabb"/>
      <!-- 点: 菱形 -->
      <path d="M9.263299,38.616922L13.211442,51.563727L-.682167,63.773831L1.263299,48.616922Z" fill="#f0cabb" id="e1_path"/>
    </g>

    <!-- ========== n ========== -->
    <!--
      スケッチ特徴:
      - 左脚: 上端がわずかに斜め or 水平、下端が外側に広がるフレア
      - アーチ: 非常に大きく丸い（半円に近い）膨らみ
      - 右脚: 下端が外側（右）に広がるフレア
      - 全体的に左右の脚が下に向かって開いていく台形
      ローカル: y=0..120, x=0..72
    -->
    <g transform="matrix(1, 0, 0, 1, 243.358, 72.2673)">
      <!-- 左縦棒: 下端フレア (x=-4..20 at bottom, x=0..18 at top) -->
      <path d="M 13.997322353036907 75.14352000051394 L -2.627632941317586 60.0411458827636 L 18 120 L -4 120 z" fill="#ef4135" id="e4_path"/>

      <!-- アーチ + 右脚: 大きな丸みのあるアーチ、右脚下端フレア -->
      <path d="M 17.63164941176217 97.19537647112992 Q 9.89628705876811 62.03980705928207 38.52659764704879 72.72197411817865 Q 44.793912941017766 65.7233129416602 44.0572117645421 104.1953764711299 L 68 120 L 46 120 L 32.7393788234387 115.08898588293492 Q 31.10772941167653 96.51053176527024 38.57845411766465 82.51320941223331 Q 16.52659764704873 75.51454823571486 6.5811317646277985 108.8270258828921 z" fill="#ef4135"/>
    </g>

    <!-- ========== g ========== -->
    <!--
      スケッチ特徴:
      - 上部: 非常に大きく開いたC字（右上が大きく開口）、太めの輪郭
      - 右縦棒: 細くてまっすぐ、上部Cの右端から下へ
      - 下の耳: 右縦棒の下端から右下へ伸び、下方向にカールしてフック状
                （スケッチでは右下に向かって伸びた後に左上へのカーブ）
      色: #3b82c4
      ローカル: y=0..120, x=0..72
    -->
    <g transform="matrix(1, 0, 0, 1, 343.825, 72.5813)">
      <!-- 上部の大きなC字（右上に開口部、太い輪郭） -->
      <!-- 外形: 大きな円弧、右側上部が開く -->
      <!-- 内形: 中くり抜き -->
      <path d="M43.576958,64.254485Q32.368194,-8.998103,12.578297,13.102932Q-17.159743,6.104271,-25.631806,23.001897Q-35.577272,71.946024,7.421389,53.160144Q14.319015,83.364892,37.314998,104.410055L44.313659,64.205306Q49.154074,51.422104,8.894791,44.791794Q-28.313973,54.368909,-4.002835,34.789116Q-8.423042,21.102932,12.209947,33.995203Q26.368194,-.998103,26.894791,33.471283Z" fill="#3b82c4" transform="matrix(0.745855, 0, 0, 1.02341, 0.536773, 1.65651)"/>

      <!-- 右縦棒（細め: 幅14）: C字の右端から下の耳まで -->
      

      <!-- 下の耳: 右縦棒下端から右下へ伸びてカール -->
      <!-- スケッチでは右下に伸びた後に丸く曲がってフック状 -->
      <path d="M26.954838,85.686184Q37.743395,98.949482,39.110407,109.317833Q16.954838,119.686184,-1.045162,117.686184Q-31.045162,115.686184,-31.045162,95.686184Q-45.779186,76.371028,-7.836398,71.634327L-28.464031,82.581132Q-27.045162,87.686184,-3.102374,90.529275Q-27.045162,109.686184,24.739379,104.529275Q-17.14352,111.527936,29.058551,111.683506Q22.954838,85.686184,14.954838,85.686184Z" fill="#3b82c4"/>
    </g>

  </g>
</svg>